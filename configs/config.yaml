source:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: ""
  database: "mydb"
  schema: "public"
  sslmode: "disable"

target:
  host: "localhost"
  port: 4000
  user: "root"
  password: ""
  database: "mydb"
  pd_addr: "localhost:2379"

migration:
  parallel: 4
  batch_size: 100000
  temp_dir: "/tmp/pg2tidb"
  tables: []
  exclude_tables: []
  use_lightning: true
  on_error: "abort"
  checkpoint_dir: ".checkpoint"
  read_timeout: "30m"
  write_timeout: "30m"

compare:
  no_pk_strategy: "auto"           # auto / hash_group / aggregate / bucket
  no_pk_bucket_count: 100          # for bucket strategy
  no_pk_table_threshold: 1000000   # rows above this use aggregate/bucket in auto mode
  compare_mode: "sample"           # quick / sample / checksum / full
  checksum_chunk_size: 50000       # rows per chunk in checksum mode
  checksum_parallel: 4             # concurrent chunks in checksum mode

logging:
  level: "info"
  format: "console"
  output: ""

web:
  enable: false
  port: 8080
  host: "0.0.0.0"

# CDC incremental sync (PostgreSQL logical replication → TiDB).
# OPTIONAL module — disabled by default. pg2tidb ships as a pure full-migration
# tool; set enable: true only when you need zero-downtime incremental sync.
# When disabled, `pg2tidb cdc` prints an enable hint instead of running (see D2).
cdc:
  enable: false                 # master switch — off by default
  mode: "full_incr"             # full_incr (full + incremental, default) / incr_only (needs pre-migrated schema)
  slot_name: "pg2tidb_cdc"      # PostgreSQL logical replication slot
  publication_name: "pg2tidb_pub"  # PostgreSQL publication
  batch_size: 1000              # max events per apply batch
  parallel: 1                   # 1=serial (correctness-first); >1 routes per-table, no cross-table FK/txn guarantee (#t48 Bug#8)
  conflict_strategy: "replace"  # replace / insert_ignore / upsert / skip
  sync_ddl: true                # replicate source DDL to TiDB (CREATE/ALTER/DROP TABLE + INDEX BTREE; VIEW/FN/TRIGGER skipped); false = DML only (pre-migrated schema)
  tables: []                    # include list (schema.table, supports *)
  exclude_tables: []            # exclude list (schema.table, supports *)
  checkpoint_file: ".cdc_checkpoint.json"  # LSN checkpoint file
